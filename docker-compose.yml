services:
  party-share:
    build: .
    network_mode: host          # UDP 端口段直通宿主机，避免逐个映射
    restart: unless-stopped
    environment:
      PORT: ${PORT:-8100}
      BIND: ${BIND:-127.0.0.1}  # 网页/信令只监听本机，由宝塔 Nginx 反向代理
      ANNOUNCED_IP: ${ANNOUNCED_IP}
      RTC_MIN_PORT: ${RTC_MIN_PORT:-40000}
      RTC_MAX_PORT: ${RTC_MAX_PORT:-40099}
      APP_PASSWORD: ${APP_PASSWORD}
